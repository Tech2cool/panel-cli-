services:
  db:
    image: postgres:16-alpine

    container_name: {{NAME}}

    environment:
      POSTGRES_DB: {{DB_NAME}}
      POSTGRES_USER: {{DB_USER}}
      POSTGRES_PASSWORD: {{DB_PASS}}

    volumes:
      - /opt/panel/volumes/{{NAME}}:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:{{PORT}}:5432"

    restart: unless-stopped