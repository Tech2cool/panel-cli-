services:
  app:
    image: node:20-alpine

    container_name: {{NAME}}

    working_dir: /app

    command: sh -c "{{START}}"

    env_file:
      - /opt/panel/apps/{{NAME}}/.env

    volumes:
      - /opt/panel/apps/{{NAME}}/app:/app

    ports:
      - "127.0.0.1:{{PORT}}:3000"

    restart: unless-stopped